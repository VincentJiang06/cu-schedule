# CU Schedule — 静态站点的 nginx 站点配置(容器内 /etc/nginx/conf.d/default.conf)
#
# 缓存策略与 docs/api-design.md 的数据契约一一对应:
#   - manifest.json      no-cache:它是数据版本的入口,必须每次再验证(ETag 304 很便宜)
#   - programs.json      no-cache:前端 programs.ts 尚未带 ?v= 版本参数(已知欠账,
#                        见 api-design §5)。接上 ?v= 后可移入下面的 immutable 段。
#   - 其余 /data/**      1 年 immutable:客户端一律带 ?v=<generatedAt> 请求,
#                        版本变则 URL 变,长缓存绝对安全
#   - /assets/**         1 年 immutable:Vite 产物文件名自带内容哈希
#   - index.html 与 /    no-cache:入口必须每次再验证,才能立即看到新发布
#
# 压缩:构建阶段已对 js/css/json/svg/html 预压缩出 .gz(gzip -9),
# gzip_static 直接回预压缩文件,零运行时 CPU;gzip on 兜底未预压缩的内容。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # 预压缩优先,运行时压缩兜底
    gzip_static on;
    gzip on;
    gzip_types application/json text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # 基础安全头(纯静态站,无外部资源)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ---- 数据契约的缓存分层 ----

    location = /data/manifest.json {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # programs.ts 还没带 ?v=;在那之前不能给它长缓存
    location = /data/programs.json {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location /data/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # 站点私有扩展 API(部署方自备服务,不随本仓库分发;无此服务时 502,前端自动降级)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store" always;
    }

    # 只读分享 API：反代到同容器内的 Node 服务(server/index.mjs, 127.0.0.1:8787)
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store" always;
    }

    # 五页(/info /select /timetable /export /appendix)是真路径路由(History API),深链/
    # 刷新都要落到这里回 index.html 由前端接管;#v=<id> 只读分享是 hash,不占路径不受影响
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri $uri/ /index.html;
    }
}
