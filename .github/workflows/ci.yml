name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      # 第五门(2026-07-15,fable_docs 04 §4.5):lib 纯逻辑单测,快门在前。
      - name: Unit tests (lib pure logic)
        run: npm test

      - name: Build
        run: npm run build

      - name: Check requirement parsing (zero false positives)
        run: npm run data:check

      - name: Audit data bundles against raw catalog
        run: npm run data:audit
