    <noscript>
      <h1>CUHK Schedule · 中大选课助手</h1>
      <p>
        CUHK Schedule 是香港中文大学（CUHK）学生的选课与课表规划工具：输入要上的课和已经修过的课，
        系统自动枚举每门课的 section 组合排出可行课表，并对全学期课程逐一判断能否放进当前课表。
      </p>
      <ul>
        <li>自动排课：遵守 CUHK 的 cohort 配对规则，排除时间冲突，按上课天数从少到多给出多种排法</li>
        <li>可选课主动筛选：对全学期每门课标注「可选 / 换排法 / 冲突 / 待定」四种状态</li>
        <li>先修与反修条件解析：把选课限制的自由文本解析成布尔表达式，用三值逻辑（满足 / 不满足 / 不确定）求值</li>
        <li>对照培养方案：按入学年份与主修展开官方课程结构，标记已完成课程</li>
        <li>导出与分享：导出 ICS 日历、PNG 课表对比图，或生成只读分享链接</li>
      </ul>
      <p>课程数据抓取自 CUHK 公开课程目录。请启用 JavaScript 以使用完整功能。</p>
    </noscript>
